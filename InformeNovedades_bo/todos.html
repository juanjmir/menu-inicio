<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Novedades de Laboratorios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Contenedor general que permite scroll si el contenido es muy ancho */
#novedadesGrid {
    width: 100%;
    overflow-x: auto;
    margin-top: 20px;
    border: 1px solid #ccc; /* Contenedor exterior */
}

/* Tabla base */
.excel-table {
    width: 100%;
    border-collapse: collapse;
    font-family: Arial, sans-serif;
    font-size: 0.85rem;
    color: #333;
    background-color: #fff;
    min-width: 1000px; /* Evita que las columnas se aplasten en pantallas chicas */
}

/* Forzar bordes y alineación en encabezados */
.excel-table td {
    padding: 10px 12px;
    border: 1px solid #dcdcdc;
    vertical-align: middle; /* <-- Ahora todo se centra verticalmente por defecto */
}

/* Las columnas con mucho texto las dejamos arriba para que se lea mejor */
.excel-table td:nth-child(5), /* Docente */
.excel-table td:nth-child(6), /* Asignatura */
.excel-table td:nth-child(7), /* Problema Detectado */
.excel-table td:nth-child(8) { /* Descripción General */
    vertical-align: top; 
}

/* Modificación: Ajustes de ancho para evitar saltos de texto feos */
.excel-table th:nth-child(1), .excel-table td:nth-child(1) { width: 50px; text-align: center; } /* Estado */
.excel-table th:nth-child(2), .excel-table td:nth-child(2) { width: 105px; text-align: center; white-space: nowrap; } /* Fecha (No se rompe) */
.excel-table th:nth-child(3), .excel-table td:nth-child(3) { width: 95px; text-align: center; white-space: nowrap; } /* Horario (No se rompe) */
.excel-table th:nth-child(4), .excel-table td:nth-child(4) { width: 100px; text-align: center; } /* Laboratorio */

/* Una ligera sombra a las cabeceras para que tenga más aspecto de aplicación corporativa */
.excel-table th {
    background-color: #f8f9fa;
    color: #495057;
    font-weight: 600;
    padding: 10px 12px;
    border: 1px solid #cfd4da;
    text-align: left;
    white-space: nowrap;
}

/* Ancho controlado para las columnas más críticas */
.excel-table th:nth-child(1), .excel-table td:nth-child(1) { width: 60px; text-align: center; } /* Estado */
.excel-table th:nth-child(2), .excel-table td:nth-child(2) { width: 90px; text-align: center; } /* Fecha */
.excel-table th:nth-child(3), .excel-table td:nth-child(3) { width: 90px; text-align: center; } /* Horario */
.excel-table th:nth-child(4), .excel-table td:nth-child(4) { width: 100px; text-align: center; } /* Laboratorio */

/* Columna de descripción: le damos más espacio por textos largos */
.excel-table td:nth-child(8) {
    min-width: 250px;
    white-space: pre-line; /* Respeta los saltos de línea del texto de insumos */
}

/* Filas alternas */
.excel-table tbody tr:nth-child(even) {
    background-color: #fdfdfd;
}

/* Hover al pasar el mouse */
.excel-table tbody tr:hover {
    background-color: #f5f5f5;
}

/* Fila completada */
.excel-table tbody tr.row-completed {
    background-color: #ebf7ed !important;
    color: #888;
}
.excel-table tbody tr.row-completed td {
    text-decoration: line-through;
    text-decoration-color: rgba(0,0,0,0.15);
}

/* Badge del Laboratorio */
.table-badge {
    background-color: #0d6efd;
    color: white;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 0.75rem;
    font-weight: bold;
}
    </style>
</head>
<body>
    <header>
        <h1>Todos los Registro de Informe de Novedades</h1>
        <a href="index.html" class="btn btn-outline-primary" style="color:white; text-decoration:none;">Volver</a>

    </header>

    <main id="novedadesGrid" class="container">
        </main>

    <script src="app_todos.js"></script>
</body>
</html>
